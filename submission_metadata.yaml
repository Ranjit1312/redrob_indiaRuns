# <=200 words
methodology_summary: >
  Core principle: applied, shipped experience is the ground truth, not keyword
  tags. The JD's six must-have facets are embedded (bge-small-en-v1.5) and scored
  against career history with per-facet BM25 and evidence regexes. Each past
  role's full description is scored as one whole chunk (never split
  point-by-point), so a "ranking" mention earns credit only with its surrounding
  ownership, scale and recency context; this preserves who-owned-what and defeats
  decontextualised keyword-stuffing and template traps. Self-reported skills never
  lift the score alone (only when corroborated by career text);
  skill_assessment_scores is the sole trusted out-of-experience signal,
  evidence-gated and confidence-discounted. Why a LightGBM LambdaMART student on
  top of deterministic rules: the hand-built rules are auditable domain priors but
  cannot capture non-linear feature interactions; a student distilled from a
  cross-encoder teacher learns that residual ordering, blended at alpha=0.2 so
  rules still dominate 80% - accuracy gains without a black box overriding
  decisions. Integrity, availability and notice gates apply OUTSIDE the blend, so
  no learned score overrides a disqualifier; honeypots fall to consistency checks,
  not special-casing. Rules-compliant by construction: top-100, CPU-only,
  ~39s/0.31GB (well under 5min/16GB), offline. Every rule was audit-driven and
  base-rate-verified.
