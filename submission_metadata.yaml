# <=200 words
methodology_summary: >
  Two-phase system. Offline precompute (GPU optional): the JD is split into six
  facet queries embedded with a bi-encoder (bge-small-en-v1.5) and scored
  against every career chunk with recency weighting, combined with per-facet
  BM25 and structured fit features; a JD-rule evidence layer scores
  must-have categories from career descriptions with ownership/context/recency
  credit, plus a continuous integrity score replacing binary honeypot gates
  (hard contradictions x0.05, pervasive synthetic noise soft-damped).
  A cross-encoder teacher (bge-reranker-v2-m3, 8K context, bias-validated on
  corpus templates) labels an 8K shortlist + 4K random negatives; labels are
  gated by anti-stuffer corroboration and integrity, then distilled into a
  tuned LightGBM LambdaMART student. The constrained ranking step is CPU-only:
  it loads ~16.5MB of artifacts, predicts the student, recomputes the
  deterministic rules composite in numpy, and blends at alpha=0.2 (rules
  dominate; the alpha sweep peaked there). Integrity, availability and
  notice-period gates are applied OUTSIDE the blend so no learned score can
  override a disqualifier. Runs in ~39s wall / 0.31GB RAM against the 100K pool
  (13% of the 5-min budget; feature build parallelised across cores). Every
  rule was audit-driven and base-rate-verified before adoption.
