[pytest]
# RedRob ranker test-suite. See tests/conftest.py for fixtures + RANK_VERSION gating.
#   pytest -q                 # full suite (includes slow end-to-end rank runs)
#   pytest -q -m "not slow"   # fast: contract + trap + import-guard tests only
markers =
    slow: end-to-end tests that actually invoke rank.py (needs artifacts_full/ + candidates.jsonl)
testpaths = tests
